<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Car World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Car World</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="stats.html">Stats</a></li>
            <li><a href="reviews.html">Reviews</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main class="content">
        <h1>Contact Us</h1>
        <section class="contact-form">
            <h2>Send a Message</h2>
            <form action="#" method="post">
                <label>Name:</label>
                <input type="text" placeholder="Your Name" required>
                <label>Email:</label>
                <input type="email" placeholder="Your Email" required>
                <label>Message:</label>
                <textarea placeholder="Your Message" rows="5" required></textarea>
                <button type="submit">Send</button>
            </form>
        </section>

        <section class="contact-table">
            <h2>Our Contact Info</h2>
            <table>
                <thead>
                    <tr><th>Type</th><th>Details</th></tr>
                </thead>
                <tbody>
                    <tr><td>Email</td><td>boagoletsholo0@gmail.com</td></tr>
                    <tr><td>Phone</td><td>+267 75847727</td></tr>
                    <tr><td>Address</td><td>Gaborone, Botswana</td></tr>
                    <tr><td>Support Hours</td><td>Mon-Fri 9:00-17:00</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Car World | Designed by Boago Letsholo</p>
    </footer>
</body>
</html>
