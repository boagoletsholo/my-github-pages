<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoSphere | Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="navbar navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-danger" href="index.html">AutoSphere</a>
  </div>
</nav>

<section class="container py-5">
  <h2 class="mb-4">Contact AutoSphere</h2>

  <form>
    <div class="mb-3">
      <label>Name</label>
      <input type="text" class="form-control" required>
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control" required>
    </div>

    <div class="mb-3">
      <label>Message</label>
      <textarea class="form-control" rows="4"></textarea>
    </div>

    <button class="btn btn-danger">Send Message</button>
  </form>

  <hr class="my-4">

  <h5>Or contact via email directly:</h5>
  <p>
    <a href="mailto:yourname@example.com" class="text-danger fw-bold">
      yourname@example.com
    </a>
  </p>

</section>

</body>
</html>
