<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoSphere | Interactive Car Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVIGATION -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold text-danger" href="#">AutoSphere</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero text-center">
  <div class="container">
    <h1 class="fw-bold">Explore Modern Performance Cars</h1>
    <p>Click a car to view its performance statistics.</p>

    <input type="text" id="searchInput" class="form-control w-50 mx-auto mt-4"
      placeholder="Search for a car..." onkeyup="searchCar()">
  </div>
</section>

<!-- CAR CARDS -->
<section class="container py-5">
  <div class="row g-4" id="carContainer">

    <div class="col-md-4 car-item" data-name="bmw m4">
      <div class="car-card" onclick="showCar('bmw')">
        <img src="https://images.unsplash.com/photo-1617531653332-bd46c24f2068">
        <h5>BMW M4</h5>
      </div>
    </div>

    <div class="col-md-4 car-item" data-name="audi rs7">
      <div class="car-card" onclick="showCar('audi')">
        <img src="https://images.unsplash.com/photo-1580273916550-e323be2ae537">
        <h5>Audi RS7</h5>
      </div>
    </div>

    <div class="col-md-4 car-item" data-name="toyota supra">
      <div class="car-card" onclick="showCar('supra')">
        <img src="https://images.unsplash.com/photo-1603386329225-868f9b1ee6b5">
        <h5>Toyota Supra</h5>
      </div>
    </div>

  </div>
</section>

<!-- STATS TABLE -->
<section class="container pb-5">
  <h2 class="text-center mb-4">Car Performance Statistics</h2>

  <table class="table table-bordered text-center" id="statsTable">
    <thead class="table-danger">
      <tr>
        <th>Car</th>
        <th>Horsepower</th>
        <th>0-100 km/h</th>
        <th>Top Speed</th>
      </tr>
    </thead>
    <tbody id="statsBody">
      <tr>
        <td>Select a car above to view its stats</td>
        <td>-</td>
        <td>-</td>
        <td>-</td>
      </tr>
    </tbody>
  </table>
</section>

<script src="script.js"></script>

</body>
</html>
